name: "Report a role"
description: "Report a closed, wrong, mislabelled or duplicate role — or suggest a category/country."
title: "[report]: "
labels: ["report"]
body:
  - type: input
    id: url
    attributes:
      label: Role link (Workopia or employer URL)
      placeholder: https://workopia.io/jobs/...
    validations:
      required: false
  - type: dropdown
    id: issue
    attributes:
      label: What's the problem?
      options:
        - Role is closed / no longer accepting applications
        - Wrong company
        - Wrong location
        - Wrong category or seniority tier
        - Duplicate listing
        - Suggest a new category / country
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      placeholder: Anything that helps us fix the source data.
    validations:
      required: false
